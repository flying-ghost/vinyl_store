<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Товар — ВиниловыйМир</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-content">
            <div class="logo">Виниловый<span class="logo-accent">Мир</span></div>
            <nav>
                <ul>
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="catalog.html">Каталог</a></li>
                    <li><a href="about.html">О нас</a></li>
                    <li><a href="contact.html">Контакты</a></li>
                </ul>
            </nav>
            <button class="nav-toggle">☰</button>
        </div>
    </header>

    <!-- PRODUCT SECTION -->
    <section class="section">
        <div class="container">
            <a href="catalog.html" style="color: #d4af37; margin-bottom: 24px; display: inline-block;">← Вернуться в каталог</a>

            <div id="productContent" style="display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: start;">
                <!-- Product Image -->
                <div id="productImage" style="background: linear-gradient(135deg, #4a7ba7 0%, #2d4a6a 100%); border-radius: 8px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 200px; box-shadow: 0 12px 40px rgba(212, 175, 55, 0.2);">
                    🎵
                </div>

                <!-- Product Info -->
                <div>
                    <div id="productBadge" style="display: inline-block; background: rgba(212, 175, 55, 0.2); border: 1px solid #d4af37; color: #d4af37; padding: 8px 16px; border-radius: 4px; font-size: 12px; font-weight: 600; margin-bottom: 16px;"></div>
                    
                    <h1 id="productTitle" style="margin-bottom: 8px;"></h1>
                    <div id="productArtist" style="font-size: 18px; color: #b0b0b0; margin-bottom: 24px;"></div>

                    <div style="background: rgba(26, 26, 26, 0.5); padding: 24px; border-radius: 8px; margin-bottom: 24px;">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
                            <div>
                                <div style="font-size: 12px; color: #b0b0b0; margin-bottom: 4px;">Год выпуска</div>
                                <div id="productYear" style="font-size: 16px; font-weight: 600;"></div>
                            </div>
                            <div>
                                <div style="font-size: 12px; color: #b0b0b0; margin-bottom: 4px;">Жанр</div>
                                <div id="productGenre" style="font-size: 16px; font-weight: 600;"></div>
                            </div>
                            <div>
                                <div style="font-size: 12px; color: #b0b0b0; margin-bottom: 4px;">Формат</div>
                                <div id="productFormat" style="font-size: 16px; font-weight: 600;"></div>
                            </div>
                            <div>
                                <div style="font-size: 12px; color: #b0b0b0; margin-bottom: 4px;">Состояние</div>
                                <div id="productCondition" style="font-size: 16px; font-weight: 600;"></div>
                            </div>
                            <div>
                                <div style="font-size: 12px; color: #b0b0b0; margin-bottom: 4px;">Лейбл</div>
                                <div id="productLabel" style="font-size: 16px; font-weight: 600;"></div>
                            </div>
                            <div>
                                <div style="font-size: 12px; color: #b0b0b0; margin-bottom: 4px;">Страна</div>
                                <div id="productCountry" style="font-size: 16px; font-weight: 600;"></div>
                            </div>
                        </div>
                    </div>

                    <div id="productPrice" style="font-size: 32px; font-weight: 600; color: #d4af37; margin-bottom: 24px;"></div>

                    <div style="display: flex; gap: 12px; margin-bottom: 24px;">
                        <button class="btn btn-primary btn-large" style="flex: 1;">Добавить в корзину</button>
                        <button class="btn btn-secondary btn-large" style="flex: 1;">♡ Избранное</button>
                    </div>

                    <div id="productDescription" style="color: #b0b0b0; line-height: 1.8; margin-bottom: 24px;"></div>
                </div>
            </div>

            <!-- Tracklist -->
            <div style="margin-top: 60px;">
                <h2>Трек-лист</h2>
                <div id="tracklist" style="background: rgba(26, 26, 26, 0.5); border-radius: 8px; overflow: hidden;"></div>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        <div class="footer-content">
            <ul class="footer-links">
                <li><a href="index.html">Главная</a></li>
                <li><a href="catalog.html">Каталог</a></li>
                <li><a href="about.html">О нас</a></li>
                <li><a href="contact.html">Контакты</a></li>
            </ul>
            <div class="footer-social">
                <a href="#" class="social-icon">📷</a>
                <a href="#" class="social-icon">▶️</a>
            </div>
            <p class="footer-copyright">© 2024 ВиниловыйМир. Все права защищены.</p>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        const product = records.find(r => r.id === productId);

        if (!product) {
            document.getElementById('productContent').innerHTML = '<h2 style="grid-column: 1/-1;">Товар не найден</h2>';
        } else {
            document.getElementById('productBadge').textContent = product.featured ? '⭐ Рекомендуемое' : product.condition;
            document.getElementById('productTitle').textContent = product.title;
            document.getElementById('productArtist').textContent = product.artist;
            document.getElementById('productYear').textContent = product.year;
            document.getElementById('productGenre').textContent = product.genre;
            document.getElementById('productFormat').textContent = product.format;
            document.getElementById('productCondition').textContent = product.condition;
            document.getElementById('productLabel').textContent = product.label;
            document.getElementById('productCountry').textContent = product.country;
            document.getElementById('productPrice').textContent = product.price.toLocaleString('ru-RU') + ' ₽';
            document.getElementById('productDescription').textContent = product.description;

            const tracklistHtml = product.tracklist.map((track, i) => `
                <div style="padding: 16px; border-bottom: 1px solid rgba(212, 175, 55, 0.1); display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <div style="font-size: 12px; color: #b0b0b0; margin-bottom: 4px;">Сторона ${track.side} • Трек ${track.number}</div>
                        <div style="font-weight: 600;">${track.title}</div>
                    </div>
                    <div style="color: #b0b0b0; font-size: 14px;">${track.duration}</div>
                </div>
            `).join('');
            document.getElementById('tracklist').innerHTML = tracklistHtml;
        }
    </script>
</body>
</html>
