<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог — ВиниловыйМир</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-content">
            <div class="logo">Виниловый<span class="logo-accent">Мир</span></div>
            <nav>
                <ul>
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="catalog.html">Каталог</a></li>
                    <li><a href="about.html">О нас</a></li>
                    <li><a href="contact.html">Контакты</a></li>
                </ul>
            </nav>
            <button class="nav-toggle">☰</button>
        </div>
    </header>

    <!-- CATALOG SECTION -->
    <section class="section" style="padding-top: 40px;">
        <div class="container">
            <div class="section-title">
                <h2>Каталог пластинок</h2>
                <p>Полная коллекция виниловых пластинок</p>
            </div>

            <!-- FILTERS -->
            <div style="background: rgba(26, 26, 26, 0.5); padding: 24px; border-radius: 8px; margin-bottom: 32px;">
                <!-- Search -->
                <div class="search-box" style="margin-bottom: 24px;">
                    <input type="text" id="searchInput" placeholder="Поиск по названию, артисту или каталогу...">
                </div>

                <!-- Genre Filter -->
                <div style="margin-bottom: 24px;">
                    <label style="display: block; margin-bottom: 12px;">Жанр:</label>
                    <div class="filter-group" id="genreFilter"></div>
                </div>

                <!-- Format Filter -->
                <div style="margin-bottom: 24px;">
                    <label style="display: block; margin-bottom: 12px;">Формат:</label>
                    <div class="filter-group" id="formatFilter">
                        <button class="filter-btn active" data-filter="all">Все</button>
                        <button class="filter-btn" data-filter="LP">LP</button>
                        <button class="filter-btn" data-filter="EP">EP</button>
                        <button class="filter-btn" data-filter="7&quot;">7"</button>
                        <button class="filter-btn" data-filter="12&quot;">12"</button>
                    </div>
                </div>

                <!-- Condition Filter -->
                <div style="margin-bottom: 24px;">
                    <label style="display: block; margin-bottom: 12px;">Состояние:</label>
                    <div class="filter-group" id="conditionFilter">
                        <button class="filter-btn active" data-filter="all">Все</button>
                        <button class="filter-btn" data-filter="Новый">Новый</button>
                        <button class="filter-btn" data-filter="Mint">Mint</button>
                        <button class="filter-btn" data-filter="Near Mint">Near Mint</button>
                        <button class="filter-btn" data-filter="Very Good+">Very Good+</button>
                    </div>
                </div>

                <!-- Sort -->
                <div class="sort-group">
                    <label>Сортировка:</label>
                    <select id="sortSelect">
                        <option value="featured">Рекомендуемые</option>
                        <option value="price-low">Цена: от низкой к высокой</option>
                        <option value="price-high">Цена: от высокой к низкой</option>
                        <option value="year-new">Год: новые первыми</option>
                        <option value="year-old">Год: старые первыми</option>
                        <option value="title">Название: A-Z</option>
                    </select>
                </div>
            </div>

            <!-- PRODUCTS GRID -->
            <div class="grid grid-4" id="productsGrid"></div>

            <!-- NO RESULTS -->
            <div id="noResults" style="text-align: center; padding: 60px 20px; display: none;">
                <h3 style="color: #b0b0b0;">Ничего не найдено</h3>
                <p style="color: #666666;">Попробуйте изменить параметры поиска</p>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        <div class="footer-content">
            <ul class="footer-links">
                <li><a href="index.html">Главная</a></li>
                <li><a href="catalog.html">Каталог</a></li>
                <li><a href="about.html">О нас</a></li>
                <li><a href="contact.html">Контакты</a></li>
            </ul>
            <div class="footer-social">
                <a href="#" class="social-icon">📷</a>
                <a href="#" class="social-icon">▶️</a>
            </div>
            <p class="footer-copyright">© 2024 ВиниловыйМир. Все права защищены.</p>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/catalog.js"></script>
</body>
</html>
